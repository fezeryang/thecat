<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园猫咪 | Campus Felines</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;800&family=Space+Mono&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f7f2;
            --accent-1: #ff5f40;
            --accent-2: #4070ff;
            --accent-3: #2ecc71;
            --accent-4: #f1c40f;
            --text: #1a1a1a;
            --grain: url("data:image/svg+xml,%3Fxml version='1.0' encoding='UTF-8'%3F%3E%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            cursor: crosshair;
        }

        /* Granular Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--grain);
            opacity: 0.08;
            pointer-events: none;
            z-index: 100;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        .header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            z-index: 50;
pointer-events: none;
}

        .title {
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-family: 'Space Mono', monospace;
            line-height: 1.5;
        }

        .title span {
            display: block;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -0.02em;
            margin-top: 8px;
            color: var(--accent-1);
        }

        /* Cat Cards */
        .cat-card {
            position: absolute;
            pointer-events: auto;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            display: block;
            background: transparent;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            padding: 0;
            width: 200px;
            height: 280px;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .cat-card:hover {
            z-index: 60;
        }

        /* Cat Blob */
        .cat-blob {
            width: 240px;
            height: 300px;
            background: #fff;
            border-radius: 45% 55% 70% 30% / 30% 40% 60% 70%;
            overflow: hidden;
            position: absolute;
            top: -10px;
            left: -20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
            mix-blend-mode: multiply;
            transform-origin: center center;
        }

        .cat-card:hover .cat-blob {
            border-radius: 50% !important;
            transform: scale(1.08);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.6), 0 10px 20px rgba(0,0,0,0.1);
            mix-blend-mode: normal;
        }

        .cat-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.1);
            transition: filter 0.8s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.8s ease;
            opacity: 0.9;
        }

        .cat-card:hover .cat-img {
            filter: grayscale(0%) contrast(1);
            opacity: 1;
        }

        /* Cat Info */
        .cat-info {
            position: absolute;
            bottom: -20px;
            left: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            background: white;
            padding: 10px 15px;
            transform: rotate(-2deg);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
            color: var(--text);
            width: max-content;
            z-index: 20;
        }

        .cat-info b {
            display: block;
            font-size: 16px;
            margin-bottom: 4px;
            font-family: 'Inter', sans-serif;
        }

        /* Nav Hint */
        .nav-hint {
            position: fixed;
            bottom: 40px;
            right: 40px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            text-align: right;
            opacity: 0.5;
            z-index: 50;
            pointer-events: none;
        }

        /* SVG Grain Filter */
        .distort {
            filter: url(#wavy);
        }
        /* Transition Overlay */
        .transition-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f9f7f2;
            opacity: 0;
            pointer-events: none;
            z-index: 900;
            transition: opacity 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .transition-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Active Card State during Transition */
        .cat-card.zooming {
            z-index: 1000 !important;
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1) !important;
            transform: scale(1.5) !important;
            pointer-events: none;
        }

        .cat-card.zooming .cat-blob {
            box-shadow: 0 20px 80px rgba(0,0,0,0.15);
        }
</head>
<body>

    <div class="decor-blob b1"></div>
    <div class="decor-blob b2"></div>
    <div class="decor-blob b3"></div>

    <header class="header">
        <div class="title">
            CAMPUS ARCHIVE / VOL.01
            <span>FELINE TRACES</span>
        </div>
        <div class="title" style="text-align: right;">
            COORDINATES: <br>
            <span id="coords" style="font-size: 14px; color: var(--text);">00.00, 00.00</span>
        </div>
    </header>

    <div id="canvas-container"></div>

    <!-- Cat 0: MARMALADE -->

    <a class="cat-card" id="cat-2" href="cat-momo.html">
        <div class="cat-blob" style="width: 260px; height: 280px; border-radius: 30% 70% 70% 30% / 50%;">
            <img src="https://images.unsplash.com/photo-1533733501057-4f8913732f36?auto=format&fit=crop&q=80&w=400" alt="INKBOT" class="cat-img">

    <!-- Cat 3: STRIPE -->
    <a class="cat-card" id="cat-3" href="cat-tiaowen.html">
        <div class="cat-blob" style="width: 250px; height: 320px; border-radius: 50% 50% 20% 80%;">

        </div>
        <div class="cat-info" style="transform: rotate(5deg); right: 20px;">

    <!-- Cat 4: PUDDING -->
    <a class="cat-card" id="cat-4" href="cat-buding.html">
        <div class="cat-blob" style="border-radius: 40% 60% 60% 40% / 40% 50% 50% 60%;">
            <img src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&q=80&w=400" alt="PUDDING" class="cat-img">
        </div>
        <div class="cat-info" style="transform: rotate(-3deg); left: -10px;">
            <b>PUDDING</b>
            ID: #CF-005 / SYS ADMIN
        </div>

    <!-- Cat 5: FLOWER -->
    <a class="cat-card" id="cat-5" href="cat-huahua.html">
        <div class="cat-blob" style="width: 270px; height: 290px; border-radius: 70% 30% 30% 70% / 60% 40% 60% 40%;">
            <img src="https://images.unsplash.com/photo-1518791841217-8f162f1912da?auto=format&fit=crop&q=80&w=400" alt="FLOWER" class="cat-img">
        </div>
        <div class="cat-info" style="transform: rotate(2deg); right: -10px;">
            <b>FLOWER</b>
            ID: #CF-006 / ARCHIVE DIV
        </div>

    <div class="nav-hint">
        HOVER TO RESOLVE FILAMENTS<br>
        CLICK TO ENTER ARCHIVE
    </div>

    <svg style="display: none;">
        <defs>
            <filter id="wavy">
                <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" />
            </filter>
        </defs>
    </svg>
    <div class="transition-overlay"></div>

    <script>
        /**
         * PHYSICS-BASED SOFT PENDULUMS (Verlet Integration)
         * 6 cats hanging from elastic strings
         */

        /**
         * FILAMENT CLASS
         * Background ambient particles with trails
         * (Ported from cat主页5.html)
         */
        class Filament {
            constructor() {
                this.init();
            }

            init() {
                this.pos = createVector(random(width), random(height));
                this.prevPos = this.pos.copy();
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.maxSpeed = random(1, 3);
                this.color = color(random(filamentColors));
                this.color.setAlpha(random(50, 150));
                this.noiseScale = 0.005;
                this.life = random(100, 300);
            }

            update() {
                let n = noise(this.pos.x * this.noiseScale, this.pos.y * this.noiseScale, frameCount * 0.002);
                let angle = map(n, 0, 1, 0, TWO_PI * 4);
                this.acc.add(p5.Vector.fromAngle(angle).mult(0.1));
                
                // Attraction to mouse
                let d = dist(mouseX, mouseY, this.pos.x, this.pos.y);
                if (d < 300) {
                    let attract = createVector(mouseX - this.pos.x, mouseY - this.pos.y);
                    attract.normalize();
                    attract.mult(0.2);
                    this.acc.add(attract);
                }

                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);

                if (this.pos.x < 0 || this.pos.x > width || this.pos.y < 0 || this.pos.y > height) {
                    this.init();
                }
            }

            display() {
                strokeWeight(random(0.5, 2));
                stroke(this.color);
                line(this.pos.x, this.pos.y, this.prevPos.x, this.prevPos.y);
                
                // Add granular "pollen" dots
                if (random() > 0.95) {
                    noStroke();
                    fill(this.color);
                    ellipse(this.pos.x, this.pos.y, 2, 2);
                }

                this.prevPos = this.pos.copy();
            }
        }

        /**
         * YARN BALL CLASS
         *
         * Organic tangled threads with physics and mouse interaction
         */
        class YarnBall {
            constructor(x, y, coreColor) {
                this.x = x;
                this.y = y;
                this.vx = random(-1, 1);
                this.vy = random(-1, 1);
                this.radius = random(25, 40);
                this.coreColor = coreColor;
                this.noiseOffset = random(1000);
                this.rotation = 0;
                this.angularVel = random(-0.02, 0.02);
                this.threads = [];
                
                // Generate organic thread paths
                for (let i = 0; i < 15; i++) {
                    let angle = (TWO_PI / 15) * i;
                    let threadPath = [];
                    for (let r = this.radius * 0.3; r < this.radius * 1.8; r += 5) {
                        let noiseVal = noise(this.noiseOffset + r * 0.01, angle * 2);
                        let offsetAngle = angle + map(noiseVal, 0, 1, -0.5, 0.5);
                        threadPath.push({
                            r: r,
                            angle: offsetAngle
                        });
                    }
                    this.threads.push(threadPath);
                }
            }
            
            update() {
                // Gravity
                this.vy += 0.15;
                
                // Mouse attraction/dragging
                let mDist = dist(mouseX, mouseY, this.x, this.y);
                if (mDist < this.radius + 30) {
                    let angle = atan2(mouseY - this.y, mouseX - this.x);
                    let pull = map(mDist, 0, this.radius + 30, 0.8, 0);
                    this.vx += cos(angle) * pull;
                    this.vy += sin(angle) * pull;
                }
                
                // Apply velocity
                this.x += this.vx;
                this.y += this.vy;
                
                // Friction
                this.vx *= 0.98;
                this.vy *= 0.98;
                
                // Rotation
                this.rotation += this.angularVel;
                this.angularVel += (this.vx * 0.01);
                this.angularVel *= 0.95;
                
                // Wall bounce
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -0.7;
                    this.angularVel *= -1;
                } else if (this.x + this.radius > width) {
                    this.x = width - this.radius;
                    this.vx *= -0.7;
                    this.angularVel *= -1;
                }
                
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy *= -0.7;
                } else if (this.y + this.radius > height) {
                    this.y = height - this.radius;
                    this.vy *= -0.6;
                    this.angularVel *= 0.5;
                }
            }
            
            display() {
                push();
                translate(this.x, this.y);
                rotate(this.rotation);
                
                // Draw threads (organic tangled look)
                noFill();
                strokeWeight(1.5);
                
                for (let thread of this.threads) {
                    beginShape();
                    for (let i = 0; i < thread.length; i++) {
                        let p = thread[i];
                        let x = cos(p.angle) * p.r;
                        let y = sin(p.angle) * p.r;
                        
                        // Varying opacity for depth
                        let alpha = map(i, 0, thread.length, 120, 30);
                        stroke(this.coreColor[0], this.coreColor[1], this.coreColor[2], alpha);
                        
                        if (i === 0) {
                            vertex(x, y);
                        } else {
                            curveVertex(x, y);
                        }
                    }
                    endShape();
                }
                
                // Core ball
                noStroke();
                fill(this.coreColor[0], this.coreColor[1], this.coreColor[2], 180);
                circle(0, 0, this.radius * 2);
                
                // Highlight
                fill(255, 255, 255, 80);
                circle(-this.radius * 0.3, -this.radius * 0.3, this.radius * 0.6);
                
                pop();
            }
        }
        let particles = [];
        const numParticles = 80;
        const filamentColors = ['#ff5f40', '#4070ff', '#2ecc71', '#f1c40f'];

        const numCats = 6;
        const gravity = 0.45;
        const friction = 0.965;
        let springs = [];
        let yarnBalls = [];
        let isNavigating = false;

        function setup() {
            let canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('canvas-container');

            // Initialize filaments
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Filament());
            }

            const positions = [
                { ax: width * 0.13, targetLen: 280 },
                { ax: width * 0.28, targetLen: 320 },
                { ax: width * 0.43, targetLen: 260 },
                { ax: width * 0.58, targetLen: 340 },
                { ax: width * 0.73, targetLen: 290 },
                { ax: width * 0.88, targetLen: 310 },
            ];
            for (let i = 0; i < numCats; i++) {
                let anchor = { x: positions[i].ax, y: -30 };
                let bob = {
                    x: anchor.x + random(-80, 80),
                    y: height * 0.42 + random(-60, 60),
                    oldX: anchor.x,
                    oldY: height * 0.42,
                    targetLen: positions[i].targetLen,
                    id: i
                };
                springs.push({ anchor, bob });
            }
            
            // Initialize yarn balls
            const yarnColors = [
                [255, 142, 114],  // Orange
                [189, 178, 255],  // Purple
                [168, 230, 207]   // Mint
            ];
            
            for (let i = 0; i < 3; i++) {
                let x = random(width * 0.2, width * 0.8);
                let y = random(height * 0.3, height * 0.6);
                yarnBalls.push(new YarnBall(x, y, yarnColors[i]));
            }
            // Add click listeners for transition
            document.querySelectorAll('.cat-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (isNavigating) return;
                    
                    isNavigating = true;
                    const targetUrl = this.getAttribute('href');
                    
                    // Add transition classes
                    this.classList.add('zooming');
                    document.querySelector('.transition-overlay').classList.add('active');
                    
                    // Navigate after delay
                    setTimeout(() => {
                        window.location.href = targetUrl;
                    }, 800);
                });
            });


        }
        function draw() {
            // Subtle fade for trail effect
            background(249, 247, 242, 15);
            
            document.getElementById('coords').innerText =  
                `${mouseX.toFixed(2).padStart(6, '0')}, ${mouseY.toFixed(2).padStart(6, '0')}`;
            
            // Draw filaments (background)
            particles.forEach(p => {
                p.update();
                p.display();
            });
            
            // Update and draw yarn balls
            for (let ball of yarnBalls) {
                ball.update();
                ball.display();
            }

            const catColors = [
                [255, 142, 114],
                [184, 212, 240],
                [189, 178, 255],
                [168, 230, 207],
                [255, 211, 182],
                [199, 232, 202]
            ];

            springs.forEach((s, idx) => {
                let dx = s.bob.x - s.anchor.x;
                let dy = s.bob.y - s.anchor.y;
                let distance = sqrt(dx * dx + dy * dy);
                let difference = s.bob.targetLen - distance;
                let percent = (difference / distance) * 0.5;
                let offsetX = dx * percent;
                let offsetY = dy * percent;

                let vx = (s.bob.x - s.bob.oldX) * friction;
                let vy = (s.bob.y - s.bob.oldY) * friction;

                s.bob.oldX = s.bob.x;
                s.bob.oldY = s.bob.y;

                s.bob.x += vx + offsetX;
                s.bob.y += vy + offsetY + gravity;

                // Mouse repulsion
                let mDist = dist(mouseX, mouseY, s.bob.x, s.bob.y);
                if (mDist < 180) {
                    let angle = atan2(s.bob.y - mouseY, s.bob.x - mouseX);
                    let push = map(mDist, 0, 180, 2.5, 0);
                    s.bob.x += cos(angle) * push;
                    s.bob.y += sin(angle) * push;
                }

                // Boundary
                s.bob.x = constrain(s.bob.x, 110, width - 110);
                s.bob.y = constrain(s.bob.y, 80, height - 160);

                // Draw string with gradient-like effect
                let c = catColors[idx];
                for (let t = 0; t <= 1; t += 0.05) {
                    let sx = lerp(s.anchor.x, s.bob.x, t);
                    let sy = lerp(s.anchor.y, s.bob.y, t);
                    let alpha = map(t, 0, 1, 20, 60);
                    stroke(c[0], c[1], c[2], alpha);
                    strokeWeight(map(t, 0, 1, 1, 2.5));
                    if (t > 0) {
                        let px = lerp(s.anchor.x, s.bob.x, t - 0.05);
                        let py = lerp(s.anchor.y, s.bob.y, t - 0.05);
                        line(px, py, sx, sy);
                    }
                }

                // Pivot dot
                noStroke();
                fill(c[0], c[1], c[2], 200);
                circle(s.anchor.x, s.anchor.y, 9);

                // Small glow circle at bob
                fill(c[0], c[1], c[2], 30);
                circle(s.bob.x, s.bob.y, 220);
                fill(c[0], c[1], c[2], 15);
                circle(s.bob.x, s.bob.y, 260);

                // Update DOM card position
                if (!isNavigating) {
                    let card = document.getElementById(`cat-${idx}`);
                    if (card) {
                        // Physics rotation
                        let rotation = (s.bob.x - s.bob.oldX) * 1.8;
                        rotation = constrain(rotation, -12, 12);
                        
                        // Parallax effect
                        // Depth multiplier: deeper items (higher index) move more
                        let depth = (idx + 1) * 1.2;
                        let paraX = (mouseX - width / 2) * 0.005 * depth;
                        let paraY = (mouseY - height / 2) * 0.005 * depth;

                        card.style.left = `${s.bob.x - 100}px`;
                        card.style.top = `${s.bob.y - 30}px`;
                        // Combine parallax translation with rotation
                        card.style.transform = `translate(${paraX}px, ${paraY}px) rotate(${rotation}deg)`;
                    }
                }
            });
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
