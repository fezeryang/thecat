<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小橘 | 图书馆守护者</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;800&family=JetBrains+Mono:wght@300;500&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdf8f2;
            --accent: #ff7043;
            --accent-light: #ffccbc;
            --accent-warm: #ffe0b2;
            --text: #2c1810;
            --glass: rgba(255, 255, 255, 0.65);
            --stroke: rgba(255, 112, 67, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            overflow: hidden;
            color: var(--text);
            height: 100vh;
        }

        /* Warm grain overlay */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* Grid overlay */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--stroke) 1px, transparent 1px),
                linear-gradient(90deg, var(--stroke) 1px, transparent 1px);
            background-size: 80px 80px;
            pointer-events: none;
            z-index: 0;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* UI Layer */
        .ui-layer {
            position: fixed;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 44px 50px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-block h1 {
            font-size: 5.5rem;
            font-weight: 800;
            line-height: 0.85;
            letter-spacing: -3px;
            color: var(--text);
            text-transform: uppercase;
        }

        .brand-block .cn-name {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            margin-top: 6px;
            letter-spacing: 0.1em;
        }

        .brand-block .id-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            opacity: 0.45;
            text-transform: uppercase;
            margin-top: 4px;
            letter-spacing: 0.12em;
        }

        .stat-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            text-align: right;
        }

        .stat-item label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            opacity: 0.5;
            display: block;
            margin-bottom: 3px;
            letter-spacing: 0.1em;
        }

        .stat-item span {
            font-size: 1.1rem;
            font-weight: 800;
        }

        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .description-panel {
            max-width: 340px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 112, 67, 0.2);
            border-radius: 20px;
            padding: 22px 26px;
            pointer-events: auto;
        }

        .description-panel h3 {
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .description-panel p {
            font-size: 0.92rem;
            line-height: 1.65;
            color: var(--text);
            opacity: 0.8;
        }

        .tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            padding: 4px 10px;
            background: var(--accent-light);
            border-radius: 20px;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .action-panel {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            pointer-events: auto;
        }

        .summon-btn {
            background: var(--accent);
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            letter-spacing: 0.06em;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 112, 67, 0.35);
        }

        .summon-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 12px 35px rgba(255, 112, 67, 0.45);
        }

        .hint {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            opacity: 0.4;
            letter-spacing: 0.1em;
        }

        /* Cat info card that follows cat */
        #cat-card {
            position: absolute;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 112, 67, 0.25);
            border-radius: 16px;
            padding: 18px 20px;
            width: 260px;
            z-index: 30;
            display: none;
            pointer-events: none;
        }

        #cat-card h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        #cat-card p {
            font-size: 0.78rem;
            line-height: 1.5;
            color: #555;
            margin-bottom: 10px;
        }

        .mini-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            border-top: 1px solid rgba(255,112,67,0.15);
            padding-top: 10px;
        }

        .mini-stat label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.58rem;
            opacity: 0.5;
            text-transform: uppercase;
            display: block;
        }

        .mini-stat span {
            font-size: 0.75rem;
            font-weight: 700;
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 44px;
            right: 50px;
            z-index: 200;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 10px 20px;
            border: 2px solid var(--text);
            border-radius: 50px;
            background: white;
            color: var(--text);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .back-btn:hover {
            background: var(--text);
            color: white;
        }

        /* Warm light blob */
        .warm-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .wb1 { width: 500px; height: 500px; background: #ffccbc; top: -150px; left: -100px; opacity: 0.5; }
        .wb2 { width: 350px; height: 350px; background: #ffe0b2; bottom: -80px; right: -60px; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="warm-blob wb1"></div>
    <div class="warm-blob wb2"></div>

    <div id="canvas-container"></div>

    <div id="cat-card">
        <h2>小橘 🍊</h2>
        <p>图书馆的常驻守护者，每天在书架间穿梭，用温暖的橘色毛发点亮每个阅读的角落。</p>
        <div class="mini-stats">
            <div class="mini-stat"><label>品种</label><span>橘猫</span></div>
            <div class="mini-stat"><label>性格</label><span>活泼好动</span></div>
            <div class="mini-stat"><label>据点</label><span>图书馆</span></div>
            <div class="mini-stat"><label>状态</label><span>巡逻中</span></div>
        </div>
    </div>

    <a class="back-btn" href="index.html">← 返回</a>

    <div class="ui-layer">
        <div class="top-bar">
            <div class="brand-block">
                <h1>XIAO<br>JU</h1>
                <div class="cn-name">小 橘</div>
                <div class="id-tag">// 校园猫咪档案 #001 / 图书馆守护者</div>
            </div>
            <div class="stat-panel">
                <div class="stat-item">
                    <label>毛色</label>
                    <span>橘白</span>
                </div>
                <div class="stat-item">
                    <label>性格</label>
                    <span>活泼</span>
                </div>
                <div class="stat-item">
                    <label>弹性</label>
                    <span>极高</span>
                </div>
                <div class="stat-item">
                    <label>状态</label>
                    <span>巡逻</span>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="description-panel">
                <h3>档案描述</h3>
                <p>小橘是图书馆的常驻守护者，以其橘白相间的毛色和活泼的性格著称。它喜欢在书架间穿梭，偶尔会跳上阅览桌，用温暖的眼神陪伴每一位读者。</p>
                <div class="tags">
                    <span class="tag">图书馆</span>
                    <span class="tag">橘猫</span>
                    <span class="tag">弹力大师</span>
                    <span class="tag">爱撒娇</span>
                </div>
            </div>
            <div class="action-panel">
                <button class="summon-btn" onclick="spawnCat()">召唤小橘</button>
                <div class="hint">拖拽互动 / 鼠标靠近</div>
            </div>
        </div>
    </div>

    <script>
        let nodes = [];
        let connections = [];
        const gridRes = 18;
        let catPos, catVel;
        let isCatLive = false;
        let catAngle = 0;
        let catMorph = 0;
        let tailAngle = 0;
        let purr = 0;

        function setup() {
            const canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('canvas-container');

            for (let y = 0; y < gridRes; y++) {
                for (let x = 0; x < gridRes; x++) {
                    nodes.push(new Node(
                        x * (width / (gridRes - 1)),
                        y * (height / (gridRes - 1))
                    ));
                }
            }

            for (let y = 0; y < gridRes; y++) {
                for (let x = 0; x < gridRes; x++) {
                    let idx = x + y * gridRes;
                    if (x < gridRes - 1) connections.push(new Connection(nodes[idx], nodes[idx + 1]));
                    if (y < gridRes - 1) connections.push(new Connection(nodes[idx], nodes[idx + gridRes]));
                }
            }

            catPos = createVector(width / 2, -200);
            catVel = createVector(0, 0);
        }

        function draw() {
            clear();
            catAngle += 0.025;
            tailAngle += 0.04;
            purr = sin(catAngle * 3) * 3;

            connections.forEach(c => c.update());
            connections.forEach(c => c.display());
            nodes.forEach(n => n.update());

            if (isCatLive) {
                physicsCat();
                drawOrangeCat();
                updateCardPosition();
            }
        }

        class Node {
            constructor(x, y) {
                this.anchorX = x; this.anchorY = y;
                this.pos = createVector(x, y);
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.damping = 0.88;
            }
            update() {
                let force = createVector(this.anchorX - this.pos.x, this.anchorY - this.pos.y);
                force.mult(0.04);
                this.acc.add(force);
                let d = dist(mouseX, mouseY, this.pos.x, this.pos.y);
                if (d < 90) {
                    let push = createVector(this.pos.x - mouseX, this.pos.y - mouseY);
                    push.normalize();
                    push.mult((90 - d) * 0.06);
                    this.acc.add(push);
                }
                if (isCatLive) {
                    let cd = dist(catPos.x, catPos.y, this.pos.x, this.pos.y);
                    if (cd < 130) {
                        let pull = createVector(catPos.x - this.pos.x, catPos.y - this.pos.y);
                        pull.normalize();
                        pull.mult((130 - cd) * 0.07);
                        this.acc.add(pull);
                    }
                }
                this.vel.add(this.acc);
                this.pos.add(this.vel);
                this.vel.mult(this.damping);
                this.acc.set(0, 0);
            }
        }

        class Connection {
            constructor(a, b) {
                this.a = a; this.b = b;
                this.restLen = dist(a.pos.x, a.pos.y, b.pos.x, b.pos.y);
            }
            update() {
                let d = dist(this.a.pos.x, this.a.pos.y, this.b.pos.x, this.b.pos.y);
                let stretch = d - this.restLen;
                let force = p5.Vector.sub(this.b.pos, this.a.pos);
                force.normalize();
                force.mult(stretch * 0.018);
                this.a.acc.add(force);
                this.b.acc.sub(force);
            }
            display() {
                let d = dist(this.a.pos.x, this.a.pos.y, this.b.pos.x, this.b.pos.y);
                let t = map(d, this.restLen * 0.5, this.restLen * 1.5, 1.5, 0.2);
                stroke(255, 112, 67, 28);
                strokeWeight(max(0.1, t));
                line(this.a.pos.x, this.a.pos.y, this.b.pos.x, this.b.pos.y);
            }
        }

        function physicsCat() {
            let gravity = createVector(0, 0.38);
            catVel.add(gravity);
            catVel.mult(0.985);
            catPos.add(catVel);

            if (catPos.y > height - 120) {
                catPos.y = height - 120;
                catVel.y *= -0.55;
                catVel.x *= 0.9;
            }
            if (catPos.x < 80) { catPos.x = 80; catVel.x *= -0.7; }
            if (catPos.x > width - 80) { catPos.x = width - 80; catVel.x *= -0.7; }

            if (mouseIsPressed && dist(mouseX, mouseY, catPos.x, catPos.y) < 90) {
                catPos.set(mouseX, mouseY);
                catVel.set((mouseX - pmouseX) * 0.8, (mouseY - pmouseY) * 0.8);
            }
        }

        function drawOrangeCat() {
            push();
            translate(catPos.x, catPos.y);

            let speed = catVel.mag();
            let lean = catVel.x * 0.8;

            // Shadow
            noStroke();
            fill(0, 0, 0, 12);
            ellipse(lean * 0.3, 110 + speed, 130, 22);

            // Body glow
            fill(255, 180, 120, 25);
            ellipse(0, 15, 180 + purr, 170 + purr);

            // Body
            fill(255, 145, 60);
            stroke(200, 100, 30, 80);
            strokeWeight(1.5);
            ellipse(0, 20, 110 + purr, 100 + purr);

            // Belly (white patch)
            fill(255, 240, 220);
            noStroke();
            ellipse(0, 30, 55, 65);

            // Stripes on body
            stroke(220, 110, 40, 120);
            strokeWeight(2.5);
            noFill();
            for (let i = -1; i <= 1; i++) {
                arc(i * 18, 15, 30, 60, -PI * 0.6, PI * 0.6);
            }

            // Head
            fill(255, 145, 60);
            stroke(200, 100, 30, 80);
            strokeWeight(1.5);
            ellipse(lean * 0.3, -55, 90 + purr * 0.5, 85 + purr * 0.5);

            // Ears
            fill(255, 145, 60);
            triangle(-32 + lean * 0.2, -82, -50 + lean * 0.2, -115, -10 + lean * 0.2, -88);
            triangle(32 + lean * 0.2, -82, 50 + lean * 0.2, -115, 10 + lean * 0.2, -88);
            // Inner ear
            fill(255, 180, 170);
            triangle(-30 + lean * 0.2, -85, -44 + lean * 0.2, -108, -14 + lean * 0.2, -90);
            triangle(30 + lean * 0.2, -85, 44 + lean * 0.2, -108, 14 + lean * 0.2, -90);

            // Face markings
            stroke(220, 110, 40, 100);
            strokeWeight(2);
            noFill();
            // Forehead stripes
            line(-8 + lean * 0.3, -88, -4 + lean * 0.3, -98);
            line(0 + lean * 0.3, -90, 0 + lean * 0.3, -102);
            line(8 + lean * 0.3, -88, 4 + lean * 0.3, -98);

            // Eyes
            let eyeX = map(catVel.x, -5, 5, -6, 6);
            let eyeY = map(catVel.y, -5, 5, -3, 3);
            fill(60, 180, 100);
            noStroke();
            ellipse(-22 + lean * 0.3 + eyeX, -52 + eyeY, 18, 20);
            ellipse(22 + lean * 0.3 + eyeX, -52 + eyeY, 18, 20);
            // Pupils
            fill(20);
            ellipse(-22 + lean * 0.3 + eyeX, -52 + eyeY, 8, 18);
            ellipse(22 + lean * 0.3 + eyeX, -52 + eyeY, 8, 18);
            // Eye shine
            fill(255, 255, 255, 200);
            ellipse(-18 + lean * 0.3 + eyeX, -56 + eyeY, 5, 5);
            ellipse(26 + lean * 0.3 + eyeX, -56 + eyeY, 5, 5);

            // Nose
            fill(255, 160, 150);
            noStroke();
            triangle(-5 + lean * 0.3, -40, 5 + lean * 0.3, -40, 0 + lean * 0.3, -34);

            // Mouth
            stroke(180, 80, 60, 150);
            strokeWeight(1.5);
            noFill();
            arc(-8 + lean * 0.3, -32, 14, 10, 0, PI);
            arc(8 + lean * 0.3, -32, 14, 10, 0, PI);

            // Whiskers
            stroke(255, 255, 255, 180);
            strokeWeight(1);
            // Left whiskers
            line(-20 + lean * 0.3, -38, -65 + lean * 0.3, -34);
            line(-20 + lean * 0.3, -36, -65 + lean * 0.3, -40);
            line(-20 + lean * 0.3, -34, -60 + lean * 0.3, -46);
            // Right whiskers
            line(20 + lean * 0.3, -38, 65 + lean * 0.3, -34);
            line(20 + lean * 0.3, -36, 65 + lean * 0.3, -40);
            line(20 + lean * 0.3, -34, 60 + lean * 0.3, -46);

            // Front paws
            fill(255, 145, 60);
            stroke(200, 100, 30, 80);
            strokeWeight(1);
            ellipse(-28, 72, 28, 22);
            ellipse(28, 72, 28, 22);
            // Paw pads
            fill(255, 180, 170);
            noStroke();
            ellipse(-28, 76, 14, 10);
            ellipse(28, 76, 14, 10);

            // Tail
            let tailWave = sin(tailAngle) * 30;
            let tailWave2 = sin(tailAngle * 0.7) * 20;
            noFill();
            stroke(255, 145, 60);
            strokeWeight(8);
            beginShape();
            curveVertex(30, 30);
            curveVertex(50, 50);
            curveVertex(80 + tailWave, 80);
            curveVertex(100 + tailWave, 60 + tailWave2);
            curveVertex(110 + tailWave * 1.2, 30 + tailWave2);
            endShape();
            // Tail tip
            fill(255, 240, 220);
            noStroke();
            ellipse(110 + tailWave * 1.2, 28 + tailWave2, 18, 18);

            // Speed lines
            if (speed > 3) {
                stroke(255, 145, 60, 100);
                strokeWeight(1.5);
                for (let i = 0; i < 4; i++) {
                    let off = i * 14;
                    line(-90, 10 + off, -130 - speed * 3, 10 + off);
                }
            }

            pop();
        }

        function spawnCat() {
            isCatLive = true;
            catPos.set(width / 2, -200);
            catVel.set(random(-3, 3), 8);
            document.getElementById('cat-card').style.display = 'block';
        }

        function updateCardPosition() {
            const card = document.getElementById('cat-card');
            let tx = catPos.x + 110;
            let ty = catPos.y - 130;
            tx = constrain(tx, 10, width - 280);
            ty = constrain(ty, 10, height - 250);
            card.style.left = `${tx}px`;
            card.style.top = `${ty}px`;
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            nodes = []; connections = [];
            setup();
        }
    </script>
</body>
</html>
