<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Felines // Trace & Filament</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f7f2;
            --accent-1: #ff5f40;
            --accent-2: #4070ff;
            --accent-3: #2ecc71;
            --accent-4: #f1c40f;
            --text: #1a1a1a;
            --grain: url("data:image/svg+xml,%3Fxml version='1.0' encoding='UTF-8'%3F%3E%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            cursor: crosshair;
        }

        /* Granular Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--grain);
            opacity: 0.08;
            pointer-events: none;
            z-index: 100;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        /* UI Elements */
        .interface {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
        }

        .header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title {
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-family: 'Space Mono', monospace;
            line-height: 1.5;
        }

        .title span {
            display: block;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -0.02em;
            margin-top: 8px;
            color: var(--accent-1);
        }

        /* Cat Nodes */
        .cat-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
        }

        .cat-node {
            position: absolute;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .cat-node:hover {
            transform: scale(1.05);
        }

        /* Dynamic Positioning */
        #cat-1 { top: 20%; left: 15%; }
        #cat-2 { top: 15%; left: 60%; }
        #cat-3 { top: 60%; left: 25%; }
        #cat-4 { top: 55%; left: 70%; }

        .cat-blob {
            width: 280px;
            height: 340px;
            background: #fff;
            border-radius: 45% 55% 70% 30% / 30% 40% 60% 70%;
            overflow: hidden;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            transition: border-radius 1s ease;
            mix-blend-mode: multiply;
        }

        .cat-node:hover .cat-blob {
            border-radius: 50%;
        }

        .cat-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.1);
            transition: filter 0.5s ease;
            opacity: 0.9;
        }

        .cat-node:hover .cat-img {
            filter: grayscale(0%) contrast(1);
            opacity: 1;
        }

        .cat-info {
            position: absolute;
            bottom: -20px;
            left: 20px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            background: white;
            padding: 10px 15px;
            transform: rotate(-2deg);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
        }

        .cat-info b {
            display: block;
            font-size: 16px;
            margin-bottom: 4px;
            font-family: 'Inter', sans-serif;
        }

        .nav-hint {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            text-align: right;
            opacity: 0.5;
        }

        /* SVG Grain Filter for displacement */
        .distort {
            filter: url(#wavy);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <main class="interface">
        <header class="header">
            <div class="title">
                CAMPUS ARCHIVE / VOL.01
                <span>FELINE TRACES</span>
            </div>
            <div class="title" style="text-align: right;">
                COORDINATES: <br>
                <span id="coords" style="font-size: 14px; color: var(--text);">00.00, 00.00</span>
            </div>
        </header>

        <div class="cat-container">
            <!-- Node 1 -->
            <div class="cat-node" id="cat-1">
                <div class="cat-blob">
                    <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=800&q=80" alt="Cat 1" class="cat-img">
                </div>
                <div class="cat-info">
                    <b>MARMALADE</b>
                    ID: #CF-001 / PATROL UNIT
                </div>
            </div>

            <!-- Node 2 -->
            <div class="cat-node" id="cat-2">
                <div class="cat-blob" style="border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;">
                    <img src="https://images.unsplash.com/photo-1573865526739-10659fec78a5?auto=format&fit=crop&w=800&q=80" alt="Cat 2" class="cat-img">
                </div>
                <div class="cat-info" style="transform: rotate(3deg); bottom: -10px; left: auto; right: -20px;">
                    <b>INKBOT</b>
                    ID: #CF-002 / LIBRARY DEP.
                </div>
            </div>

            <!-- Node 3 -->
            <div class="cat-node" id="cat-3">
                <div class="cat-blob" style="width: 320px; height: 280px; border-radius: 30% 70% 70% 30% / 50%;">
                    <img src="https://images.unsplash.com/photo-1495360010541-f48722b34f7d?auto=format&fit=crop&w=800&q=80" alt="Cat 3" class="cat-img">
                </div>
                <div class="cat-info" style="transform: rotate(-1deg); bottom: -30px;">
                    <b>GHOST</b>
                    ID: #CF-003 / ROOFTOP OBS.
                </div>
            </div>

            <!-- Node 4 -->
            <div class="cat-node" id="cat-4">
                <div class="cat-blob" style="width: 260px; height: 400px; border-radius: 50% 50% 20% 80%;">
                    <img src="https://images.unsplash.com/photo-1533738363-b7f9aef128ce?auto=format&fit=crop&w=800&q=80" alt="Cat 4" class="cat-img">
                </div>
                <div class="cat-info" style="transform: rotate(5deg); right: 20px;">
                    <b>MOCHI</b>
                    ID: #CF-004 / GARDEN LIAISON
                </div>
            </div>
        </div>

        <div class="nav-hint">
            HOVER TO RESOLVE FILAMENTS<br>
            CLICK TO ENTER ARCHIVE
        </div>
    </main>

    <svg style="display: none;">
        <defs>
            <filter id="wavy">
                <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" />
            </filter>
        </defs>
    </svg>

    <script>
        let particles = [];
        const numParticles = 80;
        const colors = ['#ff5f40', '#4070ff', '#2ecc71', '#f1c40f'];

        function setup() {
            const canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('canvas-container');
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Filament());
            }
            background('#f9f7f2');
        }

        function draw() {
            // Subtle fade for trail effect
            background(249, 247, 242, 15);

            document.getElementById('coords').innerText = 
                `${mouseX.toFixed(2).padStart(6, '0')}, ${mouseY.toFixed(2).padStart(6, '0')}`;

            particles.forEach(p => {
                p.update();
                p.display();
            });
        }

        class Filament {
            constructor() {
                this.init();
            }

            init() {
                this.pos = createVector(random(width), random(height));
                this.prevPos = this.pos.copy();
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.maxSpeed = random(1, 3);
                this.color = color(random(colors));
                this.color.setAlpha(random(50, 150));
                this.noiseScale = 0.005;
                this.life = random(100, 300);
            }

            update() {
                let n = noise(this.pos.x * this.noiseScale, this.pos.y * this.noiseScale, frameCount * 0.002);
                let angle = map(n, 0, 1, 0, TWO_PI * 4);
                this.acc.add(p5.Vector.fromAngle(angle).mult(0.1));
                
                // Attraction to mouse
                let d = dist(mouseX, mouseY, this.pos.x, this.pos.y);
                if (d < 300) {
                    let attract = createVector(mouseX - this.pos.x, mouseY - this.pos.y);
                    attract.normalize();
                    attract.mult(0.2);
                    this.acc.add(attract);
                }

                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);

                if (this.pos.x < 0 || this.pos.x > width || this.pos.y < 0 || this.pos.y > height) {
                    this.init();
                }
            }

            display() {
                strokeWeight(random(0.5, 2));
                stroke(this.color);
                line(this.pos.x, this.pos.y, this.prevPos.x, this.prevPos.y);
                
                // Add granular "pollen" dots
                if (random() > 0.95) {
                    noStroke();
                    fill(this.color);
                    ellipse(this.pos.x, this.pos.y, 2, 2);
                }

                this.prevPos = this.pos.copy();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            background('#f9f7f2');
        }

        // Add subtle parallax to cat nodes
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            
            document.querySelectorAll('.cat-node').forEach((node, index) => {
                const factor = (index + 1) * 1.2;
                node.style.transform = `translate(${moveX * factor}px, ${moveY * factor}px)`;
            });
        });
    </script>
</body>
</html>
